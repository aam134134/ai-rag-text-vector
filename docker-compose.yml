services:
  text-ingest:
    image: ai-rag-text-vector-text-ingest:1.0
    build:
      context: ./text-ingest
      dockerfile: Dockerfile
      args:
        PROJECT_NAME: ai-rag-text-vector-text-ingest
    volumes:
      - ./data:/app/data:rw
    environment:
      WATCH_DIR: /app/data/ingest/inbox
      ARCHIVE_DIR: /app/data/ingest/archive
      CHUNKS_DIR: /app/data/ingest/chunks
    container_name: ai-rag-text-vector-text-ingest
    tty: true
    stdin_open: true

  chunk-embedding:
    image: ai-rag-text-vector-chunk-embedding:1.0
    build:
      context: ./chunk-embedding
      dockerfile: Dockerfile
      args:
        PROJECT_NAME: ai-rag-text-vector-chunk-embedding
    volumes:
      - ./data:/app/data:rw
    environment:
      WATCH_DIR: /app/data/ingest/chunks
      ARCHIVE_DIR: /app/data/chunks/archive
      EMBEDS_DIR: /app/data/chunks/embeds
    container_name: ai-rag-text-vector-chunk-embedding
    depends_on:
      - text-ingest
    tty: true
    stdin_open: true

  vector-db:
    image: chromadb/chroma:1.5.3
    container_name: chroma-vector-db
    ports:
      - "8000:8000"
    volumes:
      - ./data/chroma_data:/data
    environment:
      - CHROMA_SERVER_BIND=0.0.0.0
    networks:
      - ai-rag-text-vector-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v2/tenants/default_tenant/databases/default_database/collections"]
      interval: 5s
      timeout: 3s
      retries: 20

  vector-data-ingest:
    image: ai-rag-text-vector-vector-data-ingest:1.0
    build:
      context: ./vector-data-ingest
      dockerfile: Dockerfile
      args:
         PROJECT_NAME: ai-rag-text-vector-vector-data-ingest
    volumes:
      - ./data:/app/data:rw
    environment:
      WATCH_DIR: /app/data/chunks/embeds
      ARCHIVE_DIR: /app/data/embeds/archive
      VECTOR_DB_HOST: chroma-vector-db
    networks:
      - ai-rag-text-vector-net
    container_name: ai-rag-text-vector-vector-data-ingest
    depends_on:
      - vector-db
    tty: true
    stdin_open: true

  ask:
    image: ai-rag-text-vector-ask:1.0
    build:
      context: ./ask
      dockerfile: Dockerfile
      args:
        PROJECT_NAME: ai-rag-text-vector-ask
    environment:
      VECTOR_DB_HOST: chroma-vector-db
      VECTOR_DB_PORT: 8000
      TOP_K: 5
      OLLAMA_MODEL: llama3.2:3b
      OLLAMA_URL: http://ollama:11434/api/generate
    ports:
      - "8010:8010"
    networks:
      - ai-rag-text-vector-net
    container_name: ai-rag-text-vector-ask
    depends_on:
      - vector-db
      - ollama
    restart: unless-stopped

  ollama:
    image: ollama/ollama:0.18.2
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ./data/ollama:/root/.ollama
    networks:
      - ai-rag-text-vector-net
    restart: unless-stopped

  ollama-model-pull:
    image: ollama/ollama:0.18.2
    container_name: ollama-model-pull
    depends_on:
      - ollama
    entrypoint:
      - /bin/sh
      - -c
      - |
        echo "Waiting for Ollama server at http://ollama:11434..."
        until ollama list >/dev/null 2>&1; do
          echo "Ollama not ready yet; retrying in 2 seconds..."
          sleep 2
        done
        echo "Ollama is ready. Pulling model..."
        ollama pull llama3.2:3b
        echo "Model pull complete."
    environment:
      OLLAMA_HOST: http://ollama:11434
    networks:
      - ai-rag-text-vector-net
    restart: "no"

networks:
  ai-rag-text-vector-net:
    name: ai-rag-text-vector-net
